name: Generate Media List

on:
  push:
    paths:
      - 'assets/img/Photo/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 

      - name: Generate JSON list
        run: |
          cd assets/img/Photo/Photos
          
          echo "[" > ../../../../media.json
          first=true

          find . -mindepth 1 -maxdepth 2 -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.webp" -o -iname "*.gif" \) | while read -r file; do
            clean_path=$(echo "$file" | sed 's|^\./||')
            
            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> ../../../../media.json
            fi
            echo "  \"$clean_path\"" >> ../../../../media.json
          done
          
          echo "]" >> ../../../../media.json

      - name: Commit and push JSON
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add media.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update 2-level nested photos list" && git push)